<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阴极保护智能运维平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root {
            --bg: #050a18;
            --card: rgba(15, 23, 42, 0.75);
            --text: #e5e7eb;
            --text2: #9ca3af;
            --text3: #64748b;
            --cyan: #06b6d4;
            --blue: #3b82f6;
            --purple: #8b5cf6;
            --green: #10b981;
            --yellow: #f59e0b;
            --red: #ef4444;
            --gray: #6b7280;
            --border: rgba(59, 130, 246, 0.12);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }
        .bg-grid {
            position: fixed; inset: 0;
            background-image: linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none; z-index: 0;
        }
        .glow1 { position: fixed; width: 600px; height: 600px; border-radius: 50%; top: 10%; left: 10%;
            background: radial-gradient(circle, rgba(59,130,246,0.06) 0%, transparent 70%); pointer-events: none; }
        .glow2 { position: fixed; width: 500px; height: 500px; border-radius: 50%; top: 20%; right: 5%;
            background: radial-gradient(circle, rgba(139,92,246,0.05) 0%, transparent 70%); pointer-events: none; }
        .glow3 { position: fixed; width: 700px; height: 400px; border-radius: 50%; top: -5%; left: 30%;
            background: radial-gradient(circle, rgba(6,182,212,0.04) 0%, transparent 70%); pointer-events: none; }

        /* Title */
        .header {
            position: relative; z-index: 1; height: 64px; display: flex; align-items: center;
            justify-content: space-between; padding: 0 28px;
            background: rgba(10,17,40,0.8);
            border-bottom: 1.5px solid transparent;
            background-clip: padding-box;
        }
        .header::after {
            content: ''; position: absolute; bottom: -1.5px; left: 0; right: 0; height: 1.5px;
            background: linear-gradient(90deg, transparent, rgba(6,182,212,0.6), rgba(59,130,246,0.8), rgba(139,92,246,0.6), transparent);
        }
        .header-title { display: flex; align-items: baseline; gap: 16px; }
        .header-title h1 { font-size: 22px; font-weight: 700; letter-spacing: 0.08em; color: var(--text); }
        .header-title span { font-size: 10px; color: var(--text3); letter-spacing: 0.15em; }
        .header-stats { display: flex; gap: 32px; }
        .header-stat .label { font-size: 10px; color: var(--text3); }
        .header-stat .value { font-size: 16px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
        .header-time { font-size: 13px; color: var(--cyan); font-family: 'JetBrains Mono', monospace; }
        .header-btn {
            padding: 7px 18px; border-radius: 8px; border: 1px solid var(--border);
            background: rgba(255,255,255,0.03); color: var(--text);
            cursor: pointer; font-size: 12px; font-family: inherit; font-weight: 500;
            transition: all 0.2s; display: flex; align-items: center; gap: 6px;
        }
        .header-btn:hover {
            background: rgba(59,130,246,0.1); border-color: var(--cyan);
            box-shadow: 0 0 12px rgba(6,182,212,0.2);
        }

        /* ========== 机柜列表页样式 ========== */
        .page-dashboard, .page-list { display: none; }
        .page-dashboard.active, .page-list.active { display: flex; flex-direction: column; }

        .filter-bar {
            display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
            padding: 16px 20px; margin-bottom: 14px;
            background: rgba(15,23,42,0.6); border-radius: 12px; border: 1px solid var(--border);
        }
        .filter-group { display: flex; align-items: center; gap: 6px; }
        .filter-group label { font-size: 11px; color: var(--text3); white-space: nowrap; }
        .filter-input, .filter-select {
            padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border);
            background: rgba(255,255,255,0.03); color: var(--text);
            font-size: 12px; font-family: inherit; outline: none;
            transition: all 0.2s;
        }
        .filter-input:focus, .filter-select:focus {
            border-color: var(--cyan); box-shadow: 0 0 8px rgba(6,182,212,0.15);
        }
        .filter-input { width: 130px; }
        .filter-select { min-width: 100px; cursor: pointer; }
        .filter-btn {
            padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
            background: rgba(59,130,246,0.08); color: var(--cyan);
            font-size: 11px; font-family: inherit; cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn:hover { background: rgba(59,130,246,0.15); }
        .filter-btn.primary {
            background: rgba(16,185,129,0.15); color: var(--green); border-color: rgba(16,185,129,0.3);
        }
        .filter-btn.primary:hover { background: rgba(16,185,129,0.25); }
        .filter-btn.danger {
            background: rgba(239,68,68,0.1); color: var(--red); border-color: rgba(239,68,68,0.3);
        }
        .filter-btn.danger:hover { background: rgba(239,68,68,0.2); }
        .filter-spacer { flex: 1; }

        /* 机柜表格 */
        .cabinet-table-wrap {
            flex: 1; overflow: auto; border-radius: 12px;
            background: rgba(15,23,42,0.5); border: 1px solid var(--border);
        }
        .cabinet-table-wrap::-webkit-scrollbar { width: 6px; height: 6px; }
        .cabinet-table-wrap::-webkit-scrollbar-thumb { background: rgba(59,130,246,0.3); border-radius: 3px; }
        .cabinet-table {
            width: 100%; border-collapse: collapse; font-size: 12px;
        }
        .cabinet-table th, .cabinet-table td {
            padding: 10px 14px; text-align: left; border-bottom: 1px solid rgba(59,130,246,0.08);
        }
        .cabinet-table th {
            background: rgba(59,130,246,0.08); font-weight: 600; color: var(--text2);
            position: sticky; top: 0; z-index: 1;
        }
        .cabinet-table tr:hover td { background: rgba(255,255,255,0.02); }
        .cabinet-table .status-dot {
            display: inline-block; width: 6px; height: 6px; border-radius: 50%;
            margin-right: 6px; vertical-align: middle;
        }
        .cabinet-table .status-dot.normal   { background: var(--green); box-shadow: 0 0 6px var(--green); }
        .cabinet-table .status-dot.warning  { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
        .cabinet-table .status-dot.error    { background: var(--red); box-shadow: 0 0 6px var(--red); }
        .cabinet-table .status-dot.offline  { background: var(--gray); }
        .cabinet-table .action-btns { display: flex; gap: 6px; }
        .cabinet-table .tb-btn {
            padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border);
            background: transparent; color: var(--text3); font-size: 10px;
            cursor: pointer; transition: all 0.2s;
        }
        .cabinet-table .tb-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); }
        .cabinet-table .tb-btn.edit { color: var(--cyan); border-color: rgba(6,182,212,0.3); }
        .cabinet-table .tb-btn.del  { color: var(--red); border-color: rgba(239,68,68,0.3); }
        .cabinet-table input[type="checkbox"] {
            accent-color: var(--cyan); width: 14px; height: 14px; cursor: pointer;
        }

        /* Main Layout */
        .main {
            position: relative; z-index: 1;
            display: grid;
            grid-template-columns: 440px 1fr 400px;
            gap: 14px;
            padding: 14px 16px;
            height: calc(100vh - 64px);
        }

        /* Card */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            display: flex; flex-direction: column;
            backdrop-filter: blur(12px);
        }
        .card::before {
            content: ''; height: 2px;
            background: linear-gradient(90deg, var(--cyan), var(--purple));
        }
        .card-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 16px; border-bottom: 1px solid var(--border);
            background: rgba(59,130,246,0.04);
        }
        .card-title { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; }
        .card-title .dot { width: 6px; height: 6px; border-radius: 50%; animation: blink 2s infinite; }
        @keyframes blink { 0%,100%{ opacity:1; } 50%{ opacity:0.4; } }
        .card-body { flex: 1; padding: 12px 14px; overflow: hidden; display: flex; flex-direction: column; }

        /* Left Panel */
        .left-panel { display: flex; flex-direction: column; gap: 14px; }
        .chart-wrap { flex: 1; min-height: 0; }
        .chart-box { width: 100%; height: 100%; }

        /* Center Panel - Cabinets */
        .center-panel { display: flex; flex-direction: column; }
        .stats-bar { display: flex; gap: 10px; margin-bottom: 14px; }
        .stat-item {
            flex: 1; padding: 10px 12px; border-radius: 8px;
            background: rgba(255,255,255,0.02); border-left: 3px solid var(--green);
            display: flex; flex-direction: column; gap: 4px;
        }
        .stat-item.warn { border-left-color: var(--yellow); }
        .stat-item.err { border-left-color: var(--red); }
        .stat-item.off { border-left-color: var(--gray); }
        .stat-item .s-label { font-size: 10px; color: var(--text3); }
        .stat-item .s-value { font-size: 20px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
        .stat-item .s-value.green { color: var(--green); }
        .stat-item .s-value.yellow { color: var(--yellow); }
        .stat-item .s-value.red { color: var(--red); }
        .stat-item .s-value.gray { color: var(--gray); }

        .cabinet-grid {
            flex: 1; display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 10px;
            align-content: start;
        }
        .cabinet {
            aspect-ratio: 0.85; border-radius: 10px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
            transition: all 0.3s ease; border: 1.5px solid transparent;
            position: relative; overflow: hidden;
        }
        .cabinet::after {
            content: ''; position: absolute; bottom: -1px; left: 50%; transform: translateX(-50%);
            width: 6px; height: 6px; border-radius: 50%; opacity: 0.8;
        }
        .cabinet:hover { transform: translateY(-3px) scale(1.03); z-index: 5; }
        .cabinet .icon { font-size: 14px; }
        .cabinet .num { font-size: 15px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
        .cabinet .status-text { font-size: 9px; }
        .cabinet .pulse-ring {
            position: absolute; inset: -4px; border-radius: 12px;
            border: 2px solid currentColor; opacity: 0;
            animation: cab-pulse 2s infinite;
        }
        @keyframes cab-pulse { 0%{opacity:0.6; transform:scale(0.96);} 100%{opacity:0; transform:scale(1.05);} }

        .cabinet.normal { background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.5); color: var(--green); }
        .cabinet.normal::after { background: var(--green); }
        .cabinet.normal:hover { box-shadow: 0 0 20px rgba(16,185,129,0.3); border-color: var(--green); }

        .cabinet.warning { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.5); color: var(--yellow); }
        .cabinet.warning::after { background: var(--yellow); }
        .cabinet.warning:hover { box-shadow: 0 0 20px rgba(245,158,11,0.35); border-color: var(--yellow); }
        .cabinet.warning .pulse-ring { color: var(--yellow); }

        .cabinet.error { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.6); color: var(--red); }
        .cabinet.error::after { background: var(--red); }
        .cabinet.error:hover { box-shadow: 0 0 25px rgba(239,68,68,0.4); border-color: var(--red); }
        .cabinet.error .pulse-ring { color: var(--red); animation-duration: 1.2s; }

        .cabinet.offline { background: rgba(107,114,128,0.08); border-color: rgba(107,114,128,0.35); color: var(--gray); }
        .cabinet.offline::after { background: var(--gray); }
        .cabinet.offline:hover { box-shadow: 0 0 15px rgba(107,114,128,0.2); border-color: var(--gray); }

        /* Right Panel - Alarms */
        .right-panel { display: flex; flex-direction: column; }
        .alarm-counts { display: flex; gap: 8px; }
        .alarm-badge {
            padding: 3px 10px; border-radius: 6px; font-size: 11px;
            font-weight: 600; font-family: 'JetBrains Mono', monospace;
        }
        .alarm-badge.red { background: rgba(239,68,68,0.15); color: var(--red); }
        .alarm-badge.yellow { background: rgba(245,158,11,0.15); color: var(--yellow); }

        /* Alarm type switch tabs */
        .alarm-tabs {
            display: flex; gap: 6px; padding: 8px 14px 4px;
            border-bottom: 1px solid var(--border);
        }
        .alarm-tab {
            flex: 1; padding: 7px 6px; border-radius: 8px; border: 1px solid var(--border);
            background: rgba(255,255,255,0.02); color: var(--text3);
            cursor: pointer; font-size: 11px; font-family: inherit; font-weight: 500;
            transition: all 0.25s; text-align: center; display: flex; flex-direction: column;
            align-items: center; gap: 3px; line-height: 1.3;
        }
        .alarm-tab .tab-icon { font-size: 14px; }
        .alarm-tab .tab-cnt {
            display: inline-block; padding: 1px 6px; border-radius: 10px;
            font-size: 10px; font-weight: 700; font-family: 'JetBrains Mono', monospace;
            background: rgba(255,255,255,0.06); color: var(--text3);
            transition: all 0.25s;
        }
        .alarm-tab:hover { background: rgba(255,255,255,0.04); color: var(--text2); border-color: rgba(59,130,246,0.25); }
        .alarm-tab.active.ctrl {
            background: rgba(239,68,68,0.1); color: var(--red);
            border-color: rgba(239,68,68,0.5);
            box-shadow: 0 0 12px rgba(239,68,68,0.15);
        }
        .alarm-tab.active.ctrl .tab-cnt { background: rgba(239,68,68,0.2); color: var(--red); }
        .alarm-tab.active.sensor {
            background: rgba(6,182,212,0.1); color: var(--cyan);
            border-color: rgba(6,182,212,0.5);
            box-shadow: 0 0 12px rgba(6,182,212,0.15);
        }
        .alarm-tab.active.sensor .tab-cnt { background: rgba(6,182,212,0.2); color: var(--cyan); }

        .alarm-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; padding-right: 4px; }
        .alarm-list::-webkit-scrollbar { width: 3px; }
        .alarm-list::-webkit-scrollbar-thumb { background: rgba(59,130,246,0.3); border-radius: 2px; }

        .alarm-item {
            padding: 10px 12px; border-radius: 8px; border-left: 3px solid;
            cursor: pointer; transition: all 0.2s;
            background: rgba(255,255,255,0.01);
        }
        .alarm-item:hover { transform: translateX(3px); background: rgba(255,255,255,0.03); }
        .alarm-item.critical { border-left-color: var(--red); background: rgba(239,68,68,0.05); }
        .alarm-item.warning { border-left-color: var(--yellow); background: rgba(245,158,11,0.03); }
        .alarm-item.info { border-left-color: var(--blue); background: rgba(59,130,246,0.02); }

        .alarm-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .alarm-title-text { font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .alarm-time { font-size: 10px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
        .alarm-desc { font-size: 10px; color: var(--text2); line-height: 1.5; }
        .alarm-value {
            display: inline-block; margin-top: 5px; padding: 2px 8px; border-radius: 4px;
            font-size: 10px; font-weight: 600; font-family: 'JetBrains Mono', monospace;
        }
        .alarm-value.red { background: rgba(239,68,68,0.15); color: var(--red); }
        .alarm-value.yellow { background: rgba(245,158,11,0.15); color: var(--yellow); }
        .alarm-value.blue { background: rgba(59,130,246,0.1); color: var(--blue); }

        /* Detail Modal */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.65);
            z-index: 100; display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(6px);
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            border: 1px solid var(--border);
            border-radius: 16px; padding: 20px 24px 16px;
            width: 720px; max-width: 95vw;
            box-shadow: 0 25px 80px rgba(0,0,0,0.6);
        }
        .modal::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, var(--cyan), var(--purple), var(--cyan));
            border-radius: 16px 16px 0 0;
        }
        .modal-title {
            font-size: 15px; font-weight: 700; margin-bottom: 14px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .modal-title .status-badge {
            font-size: 10px; padding: 3px 10px; border-radius: 12px;
            font-weight: 600;
        }
        .modal-title .status-badge.normal { background: rgba(16,185,129,0.15); color: var(--green); }
        .modal-title .status-badge.warning { background: rgba(245,158,11,0.15); color: var(--yellow); }
        .modal-title .status-badge.error { background: rgba(239,68,68,0.15); color: var(--red); }
        .modal-title .status-badge.offline { background: rgba(107,114,128,0.15); color: var(--gray); }
        .modal-subtitle { font-size: 10px; color: var(--text3); margin-top: -10px; margin-bottom: 14px; }

        /* 6分区网格 */
        .zone-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 14px;
        }
        .zone-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(59,130,246,0.1);
            border-radius: 10px; padding: 10px 8px;
            text-align: center;
            transition: all 0.2s;
        }
        .zone-card:hover {
            background: rgba(255,255,255,0.04);
            border-color: rgba(59,130,246,0.25);
            transform: translateY(-2px);
        }
        .zone-card.alert {
            border-color: rgba(239,68,68,0.4);
            background: rgba(239,68,68,0.05);
        }
        .zone-card.alert:hover { border-color: rgba(239,68,68,0.6); }
        .zone-header {
            font-size: 11px; font-weight: 600; color: var(--cyan);
            margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 4px;
        }
        .zone-header .zone-dot {
            width: 5px; height: 5px; border-radius: 50%;
        }
        .zone-card.alert .zone-header { color: var(--red); }
        .zone-params { display: flex; flex-direction: column; gap: 5px; }
        .zone-param {
            display: flex; justify-content: space-between; align-items: center;
            padding: 3px 6px; background: rgba(255,255,255,0.02); border-radius: 4px;
        }
        .zone-param .zp-label { font-size: 9px; color: var(--text3); }
        .zone-param .zp-value {
            font-size: 11px; font-weight: 600; font-family: 'JetBrains Mono', monospace;
        }
        .zone-param .zp-value.ok { color: var(--green); }
        .zone-param .zp-value.warn { color: var(--yellow); }
        .zone-param .zp-value.err { color: var(--red); }

        .modal-close {
            width: 100%; padding: 10px 24px; border-radius: 8px; border: 1px solid var(--border);
            background: rgba(255,255,255,0.03); color: var(--text2); cursor: pointer;
            font-size: 12px; font-family: inherit;
            transition: all 0.2s;
        }
        .modal-close:hover { background: rgba(255,255,255,0.06); color: var(--text); }

        /* Tab buttons for charts */
        .chart-tabs { display: flex; gap: 4px; margin-bottom: 10px; }
        .chart-tab {
            padding: 4px 10px; border-radius: 6px; font-size: 10px;
            border: 1px solid var(--border); background: transparent;
            color: var(--text3); cursor: pointer; font-family: inherit; transition: all 0.2s;
        }
        .chart-tab:hover { background: rgba(255,255,255,0.03); }
        .chart-tab.active { background: rgba(59,130,246,0.15); color: var(--cyan); border-color: var(--cyan); }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="glow1"></div>
    <div class="glow2"></div>
    <div class="glow3"></div>

    <!-- Title Bar -->
    <div class="header">
        <div class="header-title">
            <h1 id="pageTitle">⚡ 阴极保护智能运维平台</h1>
            <span id="pageSubtitle">CATHODIC PROTECTION INTELLIGENT O&M PLATFORM</span>
        </div>
        <div class="header-stats" id="headerStats">
            <div class="header-stat"><div class="label">设备总数</div><div class="value" style="color:var(--cyan)">24</div></div>
            <div class="header-stat"><div class="label">在线率</div><div class="value" style="color:var(--green)">95.8%</div></div>
            <div class="header-stat"><div class="label">报警数</div><div class="value" style="color:var(--red)">5</div></div>
            <div class="header-stat"><div class="label">保护率</div><div class="value" style="color:var(--purple)">98.2%</div></div>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
            <a class="header-btn" href="1.html">
                <span>📋</span>
                <span>机柜列表</span>
            </a>
            <div class="header-time" id="clock">--</div>
        </div>
    </div>

    <!-- ========== 大屏首页 ========== -->
    <div class="main" id="pageDashboard">
        <!-- LEFT: Charts -->
        <div class="left-panel">
            <div class="card" style="flex: 1.2;">
                <div class="card-header">
                    <div class="card-title"><span class="dot" style="background:var(--cyan)"></span>参比电压曲线</div>
                    <div class="chart-tabs" id="voltageTabs">
                        <button class="chart-tab active" onclick="filterVoltage('all', this)">全部</button>
                        <button class="chart-tab" onclick="filterVoltage('error', this)">报警</button>
                        <button class="chart-tab" onclick="filterVoltage('warning', this)">报警</button>
                    </div>
                </div>
                <div class="card-body"><div class="chart-box" id="voltageChart"></div></div>
            </div>
            <div class="card" style="flex: 0.8;">
                <div class="card-header">
                    <div class="card-title"><span class="dot" style="background:var(--purple)"></span>输出电流曲线</div>
                    <div class="chart-tabs" id="currentTabs">
                        <button class="chart-tab active" onclick="filterCurrent('all', this)">全部</button>
                        <button class="chart-tab" onclick="filterCurrent('error', this)">报警</button>
                    </div>
                </div>
                <div class="card-body"><div class="chart-box" id="currentChart"></div></div>
            </div>
        </div>

        <!-- CENTER: Cabinets -->
        <div class="card center-panel">
            <div class="card-header">
                <div class="card-title"><span class="dot" style="background:var(--green)"></span>机柜状态监控</div>
                <span style="font-size:10px; color:var(--text3)">24台设备</span>
            </div>
            <div class="card-body">
                <div class="stats-bar">
                    <div class="stat-item"><span class="s-label">正常运行</span><span class="s-value green" id="cntNormal">18</span></div>
                    <div class="stat-item warn"><span class="s-label">告警</span><span class="s-value yellow" id="cntWarning">3</span></div>
                    <div class="stat-item err"><span class="s-label">报警</span><span class="s-value red" id="cntError">2</span></div>
                    <div class="stat-item off"><span class="s-label">离线</span><span class="s-value gray" id="cntOffline">1</span></div>
                </div>
                <div class="cabinet-grid" id="cabinetGrid"></div>
            </div>
        </div>

        <!-- RIGHT: Alarms -->
        <div class="card right-panel">
            <div class="card-header">
                <div class="card-title"><span class="dot" style="background:var(--red)"></span>实时报警信息</div>
                <div class="alarm-counts">
                    <span class="alarm-badge red">报警 2</span>
                    <span class="alarm-badge yellow">告警 3</span>
                </div>
            </div>
            <!-- 切换按钮 -->
            <div class="alarm-tabs">
                <button class="alarm-tab active ctrl" id="tabCtrl" onclick="switchAlarmTab('ctrl')">
                    <span class="tab-icon">🗄️</span>
                    <span>控制柜采集器</span>
                    <span class="tab-cnt" id="cntCtrl">3</span>
                </button>
                <button class="alarm-tab sensor" id="tabSensor" onclick="switchAlarmTab('sensor')">
                    <span class="tab-icon">📡</span>
                    <span>智能电位采集仪</span>
                    <span class="tab-cnt" id="cntSensor">5</span>
                </button>
            </div>
            <div class="card-body" style="padding-top:8px;">
                <div class="alarm-list" id="alarmList"></div>
            </div>
        </div>
    </div>

        </div>
    </div>

    <!-- Cabinet Detail Modal -->
    <div class="modal-overlay" id="cabinetModal">
        <div class="modal" style="position:relative;">
            <div class="modal-title">
                <span id="modalTitle">🖥️ 机柜05</span>
                <span class="status-badge" id="modalStatusBadge">正常</span>
            </div>
            <div class="modal-subtitle" id="modalSubtitle">设备编号 · 在线 · 最后更新 11:32:15</div>
            <div class="zone-grid" id="zoneGrid"></div>
            <button class="modal-close" onclick="closeModal()">关 闭</button>
        </div>
    </div>

    <script>
        // ========== DATA ==========
        const cabinets = [
            { id: 1, name: "3CPA001AR", status: 'normal', voltage: -0.87, current: 2.3, temp: 32, online: true },
            { id: 2, name: "3CPA002AR", status: 'normal', voltage: -0.88, current: 2.5, temp: 34, online: true },
            { id: 3, name: "3CPA101AR", status: 'warning', voltage: -0.93, current: 3.8, temp: 38, online: true },
            { id: 4, name: "3CPA102AR", status: 'normal', voltage: -0.86, current: 2.4, temp: 31, online: true },
            { id: 5, status: 'error', voltage: -1.02, current: 0.0, temp: 42, online: true },
            { id: 6, status: 'normal', voltage: -0.85, current: 2.1, temp: 30, online: true },
            { id: 7, status: 'normal', voltage: -0.89, current: 2.6, temp: 33, online: true },
            { id: 8, status: 'normal', voltage: -0.87, current: 2.4, temp: 32, online: true },
            { id: 9, status: 'normal', voltage: -0.90, current: 2.7, temp: 35, online: true },
            { id: 10, status: 'warning', voltage: -0.94, current: 3.2, temp: 48, online: true },
            { id: 11, status: 'normal', voltage: -0.86, current: 2.2, temp: 31, online: true },
            { id: 12, status: 'offline', voltage: 0, current: 0, temp: 0, online: false },
            { id: 13, status: 'normal', voltage: -0.88, current: 2.5, temp: 33, online: true },
            { id: 14, status: 'error', voltage: -1.01, current: 0.0, temp: 44, online: true },
            { id: 15, status: 'normal', voltage: -0.85, current: 2.0, temp: 30, online: true },
            { id: 16, status: 'normal', voltage: -0.87, current: 2.3, temp: 32, online: true },
            { id: 17, status: 'normal', voltage: -0.86, current: 2.1, temp: 31, online: true },
            { id: 18, status: 'normal', voltage: -0.88, current: 2.5, temp: 33, online: true },
            { id: 19, status: 'warning', voltage: -0.92, current: 3.0, temp: 39, online: true },
            { id: 20, status: 'normal', voltage: -0.84, current: 2.0, temp: 29, online: true },
            { id: 21, status: 'normal', voltage: -0.87, current: 2.3, temp: 32, online: true, group: 'C' },
            { id: 22, status: 'normal', voltage: -0.86, current: 2.2, temp: 31, online: true, group: 'C' },
            { id: 23, status: 'error', voltage: -1.03, current: 0.0, temp: 46, online: true, group: 'C' },
            { id: 24, status: 'normal', voltage: -0.85, current: 2.1, temp: 30, online: true, group: 'C' },
        ];

        // 为 cabinets 添加 group 字段
        cabinets.forEach((c, i) => {
            if (!c.group) c.group = i < 8 ? 'A' : i < 16 ? 'B' : 'C';
        });

        const alarms = [
            { level: 'critical', cabinet: 5,  title: '机柜05 电压异常',   desc: '参比电位 -1.02V，低于保护阈值 -0.95V，已持续15分钟', time: '11:32:15', value: '-1.02V', cls: 'red',    type: 'ctrl' },
            { level: 'critical', cabinet: 23, title: '机柜23 通讯报警',   desc: '设备无响应超过5分钟，可能存在网络或硬件问题',         time: '11:28:33', value: 'OFFLINE', cls: 'red',    type: 'ctrl' },
            { level: 'warning',  cabinet: 3,  title: '机柜03 电流偏高',   desc: '输出电流 3.8A，超过设定值 (3.5A) 的90%',             time: '11:15:42', value: '3.8A',    cls: 'yellow', type: 'ctrl' },
            { level: 'critical', cabinet: 10, title: '10号采集仪 电位异常', desc: '测量电位 -1.05V，超出保护范围，请立即检查',           time: '11:32:01', value: '-1.05V', cls: 'red',    type: 'sensor' },
            { level: 'critical', cabinet: 14, title: '14号采集仪 通讯中断', desc: '采集仪与主机通讯中断，数据无法上传',                  time: '11:20:44', value: 'LOST',   cls: 'red',    type: 'sensor' },
            { level: 'warning',  cabinet: 19, title: '19号采集仪 电位波动', desc: '参比电位波动幅度超过 ±0.05V，建议检查接地',           time: '10:55:10', value: '±0.06V', cls: 'yellow', type: 'sensor' },
            { level: 'warning',  cabinet: 7,  title: '07号采集仪 电池低电', desc: '内置电池电量低于20%，请及时更换',                    time: '10:40:22', value: '18%',    cls: 'yellow', type: 'sensor' },
            { level: 'info',     cabinet: 12, title: '机柜12 设备离线',   desc: '设备已离线，最后在线时间 10:45:00',                   time: '10:45:00', value: '--',     cls: 'blue',   type: 'ctrl' },
            { level: 'info',     cabinet: 2,  title: '02号采集仪 固件升级', desc: '采集仪固件已升级至 v2.3.1，运行正常',                 time: '10:20:00', value: 'v2.3.1', cls: 'blue',   type: 'sensor' },
        ];

        // Generate time-series data
        function genVoltageSeries(base, volatility) {
            const hours = [];
            const values = [];
            for (let h = 0; h < 24; h++) {
                hours.push(String(h).padStart(2, '0') + ':00');
                values.push(+(base + (Math.random() - 0.5) * volatility).toFixed(3));
            }
            return { hours, values };
        }

        const voltageSeries = {
            5:  genVoltageSeries(-0.99, 0.06),
            23: genVoltageSeries(-0.98, 0.05),
            3:  genVoltageSeries(-0.91, 0.04),
            10: genVoltageSeries(-0.92, 0.05),
            19: genVoltageSeries(-0.90, 0.04),
        };

        const currentSeries = {
            5:  genVoltageSeries(0.2, 0.3),
            23: genVoltageSeries(0.1, 0.2),
            3:  genVoltageSeries(3.5, 0.5),
            10: genVoltageSeries(2.8, 0.4),
        };

        const statusLabels = { normal: '正常', warning: '告警', error: '报警', offline: '离线' };

        // ========== CLOCK ==========
        function updateClock() {
            document.getElementById('clock').textContent = new Date().toLocaleString('zh-CN', {
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ========== CABINETS ==========
        function renderCabinets() {
            const grid = document.getElementById('cabinetGrid');
            grid.innerHTML = cabinets.map(c => {
                const pulse = (c.status === 'error' || c.status === 'warning') ? '<span class="pulse-ring"></span>' : '';
                return `<div class="cabinet ${c.status}" onclick="showCabinetDetail(${c.id})">
                    ${pulse}
                    <span class="icon">🖥️</span>
                    <span class="num">${c.name || String(c.id).padStart(2,'0')}</span>
                    <span class="status-text">${statusLabels[c.status]}</span>
                </div>`;
            }).join('');
        }
        renderCabinets();

        // 为每台机柜生成8个分区的模拟数据
        function genZones(cabinetStatus, online) {
            if (!online) {
                return Array.from({ length: 6 }, (_, i) => ({
                    name: `分区${i + 1}`,
                    ref: '--', voltage: '--', current: '--', alert: false
                }));
            }
            return Array.from({ length: 6 }, (_, i) => {
                // 故障机柜有1-2个分区异常，告警机柜有1个分区偏高
                const isAlert = cabinetStatus === 'error'   ? i < 2 :
                                cabinetStatus === 'warning' ? i === 0 : false;
                const baseRef  = isAlert ? -(0.98 + Math.random() * 0.08) : -(0.84 + Math.random() * 0.08);
                const baseVolt = isAlert ? (10 + Math.random() * 3)        : (22 + Math.random() * 4);
                const baseCurr = isAlert ? (0.1 + Math.random() * 0.3)     : (2.0 + Math.random() * 1.5);
                return {
                    name: `分区 ${i + 1}`,
                    ref:     baseRef.toFixed(3)  + ' V',
                    voltage: baseVolt.toFixed(1) + ' V',
                    current: baseCurr.toFixed(2) + ' A',
                    alert: isAlert
                };
            });
        }

        function showCabinetDetail(id) {
            const c = cabinets.find(x => x.id === id);
            if (!c) return;

            const statusColor = { normal: 'var(--green)', warning: 'var(--yellow)', error: 'var(--red)', offline: 'var(--gray)' };
            const statusText  = statusLabels[c.status];

            // 标题 & 副标题
            document.getElementById('modalTitle').innerHTML =
                `🖥️ &nbsp;机柜 ${String(c.id).padStart(2, '0')}`;
            const badge = document.getElementById('modalStatusBadge');
            badge.textContent  = statusText;
            badge.className    = `status-badge ${c.status}`;
            document.getElementById('modalSubtitle').textContent =
                `设备编号 CAB-${String(c.id).padStart(3,'0')} · ${c.online ? '在线' : '离线'} · 最后更新 ${new Date().toLocaleTimeString('zh-CN')}`;

            // 6分区
            const zones = genZones(c.status, c.online);
            document.getElementById('zoneGrid').innerHTML = zones.map(z => {
                const refOk   = c.online && !z.alert;
                const voltOk  = c.online && !z.alert;
                const currOk  = c.online && !z.alert;
                const refCls  = !c.online ? '' : z.alert ? 'err' : 'ok';
                const voltCls = !c.online ? '' : z.alert ? 'warn' : 'ok';
                const currCls = !c.online ? '' : z.alert ? 'warn' : 'ok';
                const dotColor = !c.online ? '#6b7280' : z.alert ? '#ef4444' : '#10b981';
                return `
                <div class="zone-card ${z.alert ? 'alert' : ''}">
                    <div class="zone-header">
                        <span class="zone-dot" style="background:${dotColor};box-shadow:0 0 6px ${dotColor}"></span>
                        ${z.name}
                    </div>
                    <div class="zone-params">
                        <div class="zone-param">
                            <span class="zp-label">输出参比</span>
                            <span class="zp-value ${refCls}">${z.ref}</span>
                        </div>
                        <div class="zone-param">
                            <span class="zp-label">输出电压</span>
                            <span class="zp-value ${voltCls}">${z.voltage}</span>
                        </div>
                        <div class="zone-param">
                            <span class="zp-label">输出电流</span>
                            <span class="zp-value ${currCls}">${z.current}</span>
                        </div>
                    </div>
                </div>`;
            }).join('');

            document.getElementById('cabinetModal').classList.add('show');
        }

        function closeModal() { document.getElementById('cabinetModal').classList.remove('show'); }
        document.getElementById('cabinetModal').addEventListener('click', e => {
            if (e.target === e.currentTarget) closeModal();
        });

        // ========== ALARMS ==========
        let currentAlarmTab = 'ctrl';

        function switchAlarmTab(tab) {
            currentAlarmTab = tab;
            document.getElementById('tabCtrl').className   = 'alarm-tab ctrl'   + (tab === 'ctrl'   ? ' active' : '');
            document.getElementById('tabSensor').className = 'alarm-tab sensor' + (tab === 'sensor' ? ' active' : '');
            renderAlarms();
        }

        function renderAlarms() {
            const filtered = alarms.filter(a => a.type === currentAlarmTab);
            document.getElementById('alarmList').innerHTML = filtered.map(a => `
                <div class="alarm-item ${a.level}" onclick="${a.cabinet ? `showCabinetDetail(${a.cabinet})` : ''}">
                    <div class="alarm-top">
                        <span class="alarm-title-text">${a.level === 'critical' ? '🔴' : a.level === 'warning' ? '🟡' : '🔵'} ${a.title}</span>
                        <span class="alarm-time">${a.time}</span>
                    </div>
                    <div class="alarm-desc">${a.desc}</div>
                    <span class="alarm-value ${a.cls}">${a.value}</span>
                </div>
            `).join('');
        }
        renderAlarms();

        // ========== CHARTS ==========
        const commonAxis = {
            axisLine: { lineStyle: { color: '#1f2937' } },
            axisLabel: { color: '#64748b', fontSize: 9 },
            splitLine: { lineStyle: { color: 'rgba(255,255,255,0.04)' } }
        };

        // Voltage Chart
        const vChart = echarts.init(document.getElementById('voltageChart'));
        function getVoltageOption(filter) {
            const series = [];
            const colors = { 5: '#ef4444', 23: '#f87171', 3: '#f59e0b', 10: '#fbbf24', 19: '#fcd34d' };
            const ids = filter === 'all' ? [5, 23, 3, 10, 19] :
                       filter === 'error' ? [5, 23] : [3, 10, 19];
            ids.forEach(id => {
                const d = voltageSeries[id];
                series.push({
                    name: '机柜' + String(id).padStart(2, '0'),
                    type: 'line', smooth: true, symbol: 'none', lineStyle: { width: 1.5, color: colors[id] },
                    areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: colors[id].replace(')', ',0.15)').replace('#', 'rgba(').replace(/rgba\(([0-9a-f]{6})/, (m, hex) => {
                            const r = parseInt(hex.slice(0,2),16), g = parseInt(hex.slice(2,4),16), b = parseInt(hex.slice(4,6),16);
                            return `rgba(${r},${g},${b},0.15)`;
                        }) },
                        { offset: 1, color: 'rgba(0,0,0,0)' }
                    ]) },
                    data: d.values
                });
            });

            return {
                tooltip: { trigger: 'axis', backgroundColor: 'rgba(15,23,42,0.95)', borderColor: '#3b82f6', textStyle: { color: '#e5e7eb', fontSize: 11 } },
                legend: { data: ids.map(id => '机柜' + String(id).padStart(2,'0')), textStyle: { color: '#9ca3af', fontSize: 10 }, top: 0, right: 0 },
                grid: { left: 48, right: 16, top: 32, bottom: 28 },
                xAxis: { type: 'category', data: voltageSeries[5].hours, ...commonAxis },
                yAxis: { type: 'value', min: -1.10, max: -0.75, ...commonAxis,
                    axisLabel: { ...commonAxis.axisLabel, formatter: v => v.toFixed(2) + 'V' } },
                series,
                markLine: { data: [{ yAxis: -0.95, lineStyle: { color: '#ef4444', type: 'dashed', width: 1 }, label: { formatter: '阈值 -0.95V', color: '#ef4444', fontSize: 9 } }] }
            };
        }
        let vOpt = getVoltageOption('all');
        vOpt.markLine = undefined;
        vOpt.series.forEach(s => {
            s.markLine = { silent: true, data: [{ yAxis: -0.95, lineStyle: { color: 'rgba(239,68,68,0.5)', type: 'dashed' }, label: { formatter: '阈值', color: '#ef4444', fontSize: 9, position: 'insideEndTop' } }] };
        });
        vChart.setOption(vOpt);

        function filterVoltage(filter, btn) {
            document.querySelectorAll('#voltageTabs .chart-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            let opt = getVoltageOption(filter);
            opt.series.forEach(s => {
                s.markLine = { silent: true, data: [{ yAxis: -0.95, lineStyle: { color: 'rgba(239,68,68,0.5)', type: 'dashed' }, label: { formatter: '阈值', color: '#ef4444', fontSize: 9, position: 'insideEndTop' } }] };
            });
            vChart.setOption(opt, true);
        }

        // Current Chart
        const cChart = echarts.init(document.getElementById('currentChart'));
        function getCurrentOption(filter) {
            const series = [];
            const colors = { 5: '#ef4444', 23: '#f87171', 3: '#f59e0b', 10: '#fbbf24' };
            const ids = filter === 'all' ? [5, 23, 3, 10] : [5, 23];
            ids.forEach(id => {
                const d = currentSeries[id];
                series.push({
                    name: '机柜' + String(id).padStart(2, '0'),
                    type: 'line', smooth: true, symbol: 'none', lineStyle: { width: 1.5, color: colors[id] },
                    areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: `rgba(${parseInt(colors[id].slice(1,3),16)},${parseInt(colors[id].slice(3,5),16)},${parseInt(colors[id].slice(5,7),16)},0.1)` },
                        { offset: 1, color: 'rgba(0,0,0,0)' }
                    ]) },
                    data: d.values
                });
            });
            return {
                tooltip: { trigger: 'axis', backgroundColor: 'rgba(15,23,42,0.95)', borderColor: '#8b5cf6', textStyle: { color: '#e5e7eb', fontSize: 11 } },
                legend: { data: ids.map(id => '机柜' + String(id).padStart(2,'0')), textStyle: { color: '#9ca3af', fontSize: 10 }, top: 0, right: 0 },
                grid: { left: 48, right: 16, top: 32, bottom: 28 },
                xAxis: { type: 'category', data: currentSeries[5].hours, ...commonAxis },
                yAxis: { type: 'value', min: 0, max: 5, ...commonAxis, axisLabel: { ...commonAxis.axisLabel, formatter: v => v.toFixed(1) + 'A' } },
                series
            };
        }
        let cOpt = getCurrentOption('all');
        cOpt.series.forEach(s => {
            s.markLine = { silent: true, data: [{ yAxis: 3.5, lineStyle: { color: 'rgba(245,158,11,0.5)', type: 'dashed' }, label: { formatter: '阈值', color: '#f59e0b', fontSize: 9, position: 'insideEndTop' } }] };
        });
        cChart.setOption(cOpt);

        function filterCurrent(filter, btn) {
            document.querySelectorAll('#currentTabs .chart-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            let opt = getCurrentOption(filter);
            opt.series.forEach(s => {
                s.markLine = { silent: true, data: [{ yAxis: 3.5, lineStyle: { color: 'rgba(245,158,11,0.5)', type: 'dashed' }, label: { formatter: '阈值', color: '#f59e0b', fontSize: 9, position: 'insideEndTop' } }] };
            });
            cChart.setOption(opt, true);
        }

        // Resize
        window.addEventListener('resize', () => { vChart.resize(); cChart.resize(); });

        // Auto-refresh simulation
        setInterval(() => {
            alarms.forEach(a => {
                if (a.cabinet) {
                    const c = cabinets.find(x => x.id === a.cabinet);
                    if (c && c.status === 'error') {
                        c.voltage = +(c.voltage + (Math.random() - 0.5) * 0.02).toFixed(3);
                    }
                }
            });
        }, 5000);

        // ========== 页面切换 ==========
        let currentPage = 'dashboard'; // 'dashboard' | 'list'

        function togglePage() {
            if (currentPage === 'dashboard') {
                currentPage = 'list';
                document.getElementById('pageDashboard').classList.remove('active');
                document.getElementById('pageList').classList.add('active');
                document.getElementById('navBtnIcon').textContent = '📊';
                document.getElementById('navBtnText').textContent = '返回大屏';
                document.getElementById('pageTitle').textContent = '📋 机柜列表管理';
                document.getElementById('pageSubtitle').textContent = 'CABINET LIST MANAGEMENT';
                document.getElementById('headerStats').style.display = 'none';
                renderCabinetTable();
            } else {
                currentPage = 'dashboard';
                document.getElementById('pageList').classList.remove('active');
                document.getElementById('pageDashboard').classList.add('active');
                document.getElementById('navBtnIcon').textContent = '📋';
                document.getElementById('navBtnText').textContent = '机柜列表';
                document.getElementById('pageTitle').textContent = '⚡ 阴极保护智能运维平台';
                document.getElementById('pageSubtitle').textContent = 'CATHODIC PROTECTION INTELLIGENT O&M PLATFORM';
                document.getElementById('headerStats').style.display = 'flex';
            }
        }

        // ========== 机柜列表页逻辑 ==========
        let selectedIds = [];

        function renderCabinetTable(filtered = null) {
            const list = filtered || cabinets;
            const tbody = document.getElementById('cabinetTableBody');
            tbody.innerHTML = list.map(c => {
                const statusDot = `<span class="status-dot ${c.status}"></span>`;
                const onlineText = c.online ? '在线' : '离线';
                const onlineColor = c.online ? 'var(--green)' : 'var(--gray)';
                const statusText = statusLabels[c.status];
                const statusColor = { normal: 'var(--green)', warning: 'var(--yellow)', error: 'var(--red)', offline: 'var(--gray)' }[c.status];
                const checked = selectedIds.includes(c.id) ? 'checked' : '';
                return `
                <tr>
                    <td><input type="checkbox" ${checked} onchange="toggleSelect(${c.id}, this.checked)"></td>
                    <td style="font-family:'JetBrains Mono',monospace;font-weight:600;">CAB-${String(c.id).padStart(3,'0')}</td>
                    <td>${c.group}机组</td>
                    <td style="font-family:'JetBrains Mono',monospace;color:${c.voltage < -0.95 ? 'var(--red)' : 'var(--cyan)'}">${c.online ? c.voltage.toFixed(3) + ' V' : '--'}</td>
                    <td style="font-family:'JetBrains Mono',monospace;color:${c.current > 3.5 ? 'var(--yellow)' : 'var(--purple)'}">${c.online ? c.current.toFixed(2) + ' A' : '--'}</td>
                    <td style="font-family:'JetBrains Mono',monospace;color:${c.temp > 45 ? 'var(--red)' : c.temp > 40 ? 'var(--yellow)' : 'var(--text)'}">${c.online ? c.temp + '°C' : '--'}</td>
                    <td style="color:${onlineColor}">${onlineText}</td>
                    <td>${statusDot}${statusText}</td>
                    <td class="action-btns">
                        <button class="tb-btn edit" onclick="editCabinet(${c.id})">编辑</button>
                        <button class="tb-btn del" onclick="deleteCabinet(${c.id})">删除</button>
                    </td>
                </tr>`;
            }).join('');
        }

        function filterCabinets() {
            const idVal = document.getElementById('filterId').value.trim().toLowerCase();
            const groupVal = document.getElementById('filterGroup').value;
            const onlineVal = document.getElementById('filterOnline').value;
            const statusVal = document.getElementById('filterStatus').value;

            const filtered = cabinets.filter(c => {
                if (idVal && !String(c.id).padStart(3, '0').includes(idVal)) return false;
                if (groupVal && c.group !== groupVal) return false;
                if (onlineVal === 'online' && !c.online) return false;
                if (onlineVal === 'offline' && c.online) return false;
                if (statusVal && c.status !== statusVal) return false;
                return true;
            });
            renderCabinetTable(filtered);
        }

        function resetFilter() {
            document.getElementById('filterId').value = '';
            document.getElementById('filterGroup').value = '';
            document.getElementById('filterOnline').value = '';
            document.getElementById('filterStatus').value = '';
            renderCabinetTable();
        }

        function toggleSelect(id, checked) {
            if (checked) {
                if (!selectedIds.includes(id)) selectedIds.push(id);
            } else {
                selectedIds = selectedIds.filter(x => x !== id);
            }
            updateCheckAll();
        }

        function toggleCheckAll() {
            const checkAll = document.getElementById('checkAll');
            const checkboxes = document.querySelectorAll('#cabinetTableBody input[type="checkbox"]');
            checkboxes.forEach(cb => cb.checked = checkAll.checked);
            selectedIds = checkAll.checked ? cabinets.map(c => c.id) : [];
        }

        function updateCheckAll() {
            const checkAll = document.getElementById('checkAll');
            const checkboxes = document.querySelectorAll('#cabinetTableBody input[type="checkbox"]');
            checkAll.checked = checkboxes.length > 0 && Array.from(checkboxes).every(cb => cb.checked);
        }

        function addCabinet() {
            const newId = Math.max(...cabinets.map(c => c.id)) + 1;
            cabinets.push({
                id: newId,
                status: 'normal',
                voltage: -0.85 + Math.random() * 0.1,
                current: 2.0 + Math.random(),
                temp: 30 + Math.floor(Math.random() * 8),
                online: true,
                group: 'A'
            });
            renderCabinetTable();
            alert(`已新增机柜 CAB-${String(newId).padStart(3, '0')}`);
        }

        function editCabinet(id) {
            const c = cabinets.find(x => x.id === id);
            if (!c) return;
            const newGroup = prompt('修改所属机组 (A/B/C):', c.group);
            if (newGroup && ['A', 'B', 'C'].includes(newGroup.toUpperCase())) {
                c.group = newGroup.toUpperCase();
                renderCabinetTable();
            }
        }

        function deleteCabinet(id) {
            if (!confirm(`确定删除机柜 CAB-${String(id).padStart(3, '0')}？`)) return;
            const idx = cabinets.findIndex(c => c.id === id);
            if (idx > -1) cabinets.splice(idx, 1);
            selectedIds = selectedIds.filter(x => x !== id);
            renderCabinetTable();
        }

        function deleteSelected() {
            if (selectedIds.length === 0) {
                alert('请先勾选要删除的机柜');
                return;
            }
            if (!confirm(`确定删除选中的 ${selectedIds.length} 个机柜？`)) return;
            selectedIds.forEach(id => {
                const idx = cabinets.findIndex(c => c.id === id);
                if (idx > -1) cabinets.splice(idx, 1);
            });
            selectedIds = [];
            renderCabinetTable();
        }
    </script>
</body>
</html>
